<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Roster">
<meta name="theme-color" content="#0a0a0a">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="assets/icon-180.png">
<link rel="icon" href="assets/icon-32.png">
<title>Roster</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #181818;
    --border: #1e1e1e;
    --accent: #c8a96e;
    --text: #e8e0d5;
    --muted: #444;
    --muted2: #666;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    min-height: 100dvh;
    padding-bottom: calc(90px + var(--safe-bottom));
    overscroll-behavior: none;
  }

  header {
    padding: calc(16px + var(--safe-top)) 16px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 50;
  }

  .logo-row { display: flex; align-items: center; gap: 10px; }

  .logo-icon {
    width: 34px;
    height: 34px;
    border-radius: 8px;
    object-fit: cover;
  }

  .logo {
    font-family: 'DM Serif Display', serif;
    font-size: 28px;
    color: var(--accent);
    letter-spacing: -1px;
  }

  .count { font-size: 10px; color: var(--muted2); letter-spacing: 2px; text-transform: uppercase; }

  .filters {
    display: flex;
    gap: 6px;
    padding: 10px 12px;
    overflow-x: auto;
    border-bottom: 1px solid var(--border);
    scrollbar-width: none;
  }
  .filters::-webkit-scrollbar { display: none; }

  .filter-btn {
    white-space: nowrap;
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted2);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-btn.active { background: var(--accent); color: #0a0a0a; border-color: var(--accent); }

  .list { padding: 8px 0; }

  .card {
    margin: 5px 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
  }

  .card-header {
    padding: 14px 16px 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
    gap: 12px;
  }

  .card-left { flex: 1; min-width: 0; }

  .card-name-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 4px;
  }

  .card-name {
    font-family: 'DM Serif Display', serif;
    font-size: 21px;
    color: var(--text);
  }

  .flag { font-size: 15px; }

  .card-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }

  .tag {
    font-size: 9px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 2px 7px;
    border-radius: 4px;
    background: var(--surface2);
    color: var(--muted2);
    border: 1px solid var(--border);
  }

  .tag.identity { color: #c8a96e; border-color: #c8a96e33; background: #c8a96e11; }

  .card-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 8px;
    flex-shrink: 0;
  }

  .scores { display: flex; gap: 5px; }

  .score-badge {
    font-size: 10px;
    padding: 3px 7px;
    border-radius: 5px;
    letter-spacing: 0.5px;
  }
  .score-phys { background: #1a1520; color: #c084fc; border: 1px solid #c084fc33; }
  .score-int  { background: #1a1200; color: #f59e0b; border: 1px solid #f59e0b33; }

  .status-selector { display: flex; gap: 5px; }

  .status-dot {
    width: 9px; height: 9px;
    border-radius: 50%;
    cursor: pointer;
    opacity: 0.25;
    transition: opacity 0.15s, transform 0.1s;
  }
  .status-dot.active { opacity: 1; transform: scale(1.25); }
  .s-cold { background: var(--muted2); }
  .s-warm { background: #c8a96e; box-shadow: 0 0 5px rgba(200,169,110,0.5); }
  .s-hot  { background: #4ade80; box-shadow: 0 0 5px rgba(74,222,128,0.5); }
  .s-dead { background: #f87171; }

  .card-body {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.28s ease;
  }
  .card-body.open { max-height: 700px; }

  .card-body-inner {
    border-top: 1px solid var(--border);
    padding: 14px 16px 16px;
  }

  .field { margin-bottom: 14px; }
  .field:last-child { margin-bottom: 0; }

  .field-label {
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted2);
    margin-bottom: 6px;
  }

  .field-value {
    font-size: 12px;
    color: var(--text);
    line-height: 1.6;
    opacity: 0.85;
  }

  .score-row {
    display: flex;
    gap: 10px;
    margin-bottom: 14px;
  }

  .score-box {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
  }

  .score-box-label {
    font-size: 9px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .score-box-label.phys { color: #c084fc; }
  .score-box-label.interest { color: #f59e0b; }

  .score-box-val {
    font-family: 'DM Serif Display', serif;
    font-size: 26px;
    line-height: 1;
  }
  .score-box-val.phys { color: #c084fc; }
  .score-box-val.interest { color: #f59e0b; }

  .score-box-sub {
    font-size: 9px;
    color: var(--muted2);
    margin-top: 2px;
  }

  .slider-wrap { margin-top: 8px; }

  .interest-slider {
    width: 100%;
    accent-color: #f59e0b;
    cursor: pointer;
    margin: 4px 0;
  }

  .slider-labels {
    display: flex;
    justify-content: space-between;
    font-size: 8px;
    color: var(--muted2);
    letter-spacing: 1px;
    margin-top: 2px;
  }

  .field-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 8px 10px;
    resize: none;
    min-height: 65px;
    line-height: 1.6;
    outline: none;
    transition: border-color 0.15s;
  }
  .field-input:focus { border-color: var(--accent); }

  .next-action-row { display: flex; gap: 6px; align-items: stretch; }

  .next-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 8px 10px;
    outline: none;
    transition: border-color 0.15s;
  }
  .next-input:focus { border-color: #4ade80; }

  .save-btn {
    padding: 8px 14px;
    background: var(--accent);
    color: #0a0a0a;
    border: none;
    border-radius: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    font-weight: 500;
    white-space: nowrap;
    transition: opacity 0.15s;
  }
  .save-btn:active { opacity: 0.7; }
  .save-btn.full { width: 100%; margin-top: 6px; }

  .delete-btn {
    width: 100%;
    padding: 9px;
    background: transparent;
    color: #f87171;
    border: 1px solid #f8717133;
    border-radius: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    margin-top: 14px;
    transition: background 0.15s;
  }
  .delete-btn:active { background: #f8717122; }

  /* Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 200;
    display: none;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px 20px 0 0;
    width: 100%;
    max-width: 500px;
    padding: 20px 16px calc(24px + var(--safe-bottom));
    animation: slideUp 0.22s ease;
    max-height: 92dvh;
    overflow-y: auto;
  }

  @keyframes slideUp {
    from { transform: translateY(100%); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .modal-title {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    color: var(--accent);
    margin-bottom: 16px;
  }

  .modal-field { margin-bottom: 12px; }
  .modal-label { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted2); margin-bottom: 5px; }

  .modal-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    padding: 10px 12px;
    outline: none;
    transition: border-color 0.15s;
  }
  .modal-input:focus { border-color: var(--accent); }

  .modal-row { display: flex; gap: 8px; }
  .modal-row .modal-field { flex: 1; }

  .modal-actions { display: flex; gap: 8px; margin-top: 16px; }

  .modal-cancel {
    flex: 1; padding: 12px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--muted2);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    cursor: pointer;
  }

  .modal-confirm {
    flex: 2; padding: 12px;
    background: var(--accent);
    border: none;
    border-radius: 10px;
    color: #0a0a0a;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
  }

  .add-fab {
    position: fixed;
    bottom: calc(28px + var(--safe-bottom));
    right: 18px;
    width: 54px; height: 54px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
    color: #0a0a0a;
    font-size: 26px;
    cursor: pointer;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 24px rgba(200,169,110,0.35);
    transition: transform 0.12s;
  }
  .add-fab:active { transform: scale(0.92); }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-size: 12px;
    letter-spacing: 1px;
  }
</style>
</head>
<body>

<header>
  <div class="logo-row">
    <img src="assets/icon-180.png" class="logo-icon" alt="logo">
    <div class="logo">Roster</div>
  </div>
  <div class="count" id="totalCount">— filles</div>
</header>

<div class="filters">
  <button class="filter-btn active" onclick="setFilter('all',this)">Toutes</button>
  <button class="filter-btn" onclick="setFilter('hot',this)">🔥 Chaud</button>
  <button class="filter-btn" onclick="setFilter('warm',this)">⚡ En cours</button>
  <button class="filter-btn" onclick="setFilter('cold',this)">❄️ Froid</button>
  <button class="filter-btn" onclick="setFilter('dead',this)">💀 Dead</button>
</div>

<div class="list" id="cardList"></div>

<button class="add-fab" onclick="openModal()">+</button>

<div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <div class="modal-title">Nouvelle fille</div>
    <div class="modal-field">
      <div class="modal-label">Prénom</div>
      <input class="modal-input" id="m-name" placeholder="Prénom" />
    </div>
    <div class="modal-row">
      <div class="modal-field">
        <div class="modal-label">Année naissance</div>
        <input class="modal-input" id="m-year" placeholder="2002" type="number" />
      </div>
      <div class="modal-field">
        <div class="modal-label">Drapeau</div>
        <input class="modal-input" id="m-flag" placeholder="🇹🇳" />
      </div>
    </div>
    <div class="modal-field">
      <div class="modal-label">Ville / Situation</div>
      <input class="modal-input" id="m-location" placeholder="Strasbourg, vit seule..." />
    </div>
    <div class="modal-field">
      <div class="modal-label">Boulot / Études</div>
      <input class="modal-input" id="m-job" placeholder="Serveuse, Master MEEF..." />
    </div>
    <div class="modal-field">
      <div class="modal-label">Identité utilisée</div>
      <input class="modal-input" id="m-identity" placeholder="PDG informatique 2003..." />
    </div>
    <div class="modal-row">
      <div class="modal-field">
        <div class="modal-label">👁 Physique /10</div>
        <input class="modal-input" id="m-phys" placeholder="7.5" type="number" step="0.5" min="1" max="10" />
      </div>
      <div class="modal-field">
        <div class="modal-label">🎯 Son intérêt /10</div>
        <input class="modal-input" id="m-ease" placeholder="5" type="number" step="0.5" min="1" max="10" />
      </div>
    </div>
    <div class="modal-field">
      <div class="modal-label">Notes</div>
      <input class="modal-input" id="m-notes" placeholder="Infos utiles..." />
    </div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeModal()">Annuler</button>
      <button class="modal-confirm" onclick="addGirl()">Ajouter</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'roster_v3';

const DEFAULT_DATA = [
  { id:1,  name:"Julie",   flag:"",   year:2005, location:"Lunel, chez parents",     job:"Supermarché Utile",                          identity:"PDG informatique 2003", phys:6.5, ease:9, status:"cold", notes:"", nextAction:"", conv:"" },
  { id:2,  name:"Moun",    flag:"🇹🇳", year:2000, location:"Neudorf, chez parents",   job:"Master MEEF",                                identity:"5ème année pharma 03",  phys:6,   ease:9, status:"cold", notes:"", nextAction:"", conv:"" },
  { id:3,  name:"Margaux", flag:"",   year:2008, location:"Berstett, chez parents",  job:"Terminale",                                  identity:"3A pharma 05",          phys:9,   ease:6, status:"cold", notes:"", nextAction:"", conv:"" },
  { id:4,  name:"Anna",    flag:"🇬🇪", year:2002, location:"Neudorf, chez parents",   job:"Auxiliaire de vie",                          identity:"PDG informatique 2003", phys:7,   ease:7, status:"cold", notes:"", nextAction:"", conv:"" },
  { id:5,  name:"Erika",   flag:"🇷🇴", year:2006, location:"Schilick, chez parents",  job:"Esthéticienne",                              identity:"PDG informatique 2003", phys:7,   ease:6, status:"cold", notes:"", nextAction:"", conv:"" },
  { id:6,  name:"Naïs",    flag:"",   year:2002, location:"Colmar, chez parents",    job:"Serveuse",                                   identity:"PDG informatique 2003", phys:7.5, ease:6, status:"cold", notes:"1 an et demi aux States", nextAction:"", conv:"" },
  { id:7,  name:"Nesr",    flag:"",   year:2000, location:"Neudorf",                 job:"?",                                          identity:"PDG informatique 2003", phys:8,   ease:3, status:"cold", notes:"Sûrement escort", nextAction:"", conv:"" },
  { id:8,  name:"Elisa",   flag:"",   year:2006, location:"Mulhouse, vit seule",     job:"Maman 2 enfants",                            identity:"",                      phys:8,   ease:7, status:"cold", notes:"Vit seule, 2 enfants", nextAction:"", conv:"" },
  { id:9,  name:"Salomé",  flag:"",   year:2002, location:"Contades, vit seule",     job:"Alternance comm — conciergerie Gutenberg",   identity:"PDG info 03",           phys:7.5, ease:6, status:"cold", notes:"École Rivétoile. Croatie + Brésil récemment", nextAction:"", conv:"" },
  { id:10, name:"Audrey",  flag:"",   year:2000, location:"Stockfeld, vit seule",    job:"Gestionnaire épargne retraite — Schiltigheim",identity:"PDG informatique 03",  phys:7,   ease:8, status:"cold", notes:"Lit, sort, F1, animés. Dernière saison SNK.", nextAction:"", conv:"" },
  { id:11, name:"Ely",     flag:"🇮🇹", year:2006, location:"Mulhouse",               job:"",                                           identity:"",                      phys:8.5, ease:7, status:"cold", notes:"", nextAction:"", conv:"" }
];

let data = [];
let currentFilter = 'all';
let openCardId = null;

const STATUS_ORDER = { hot:0, warm:1, cold:2, dead:3 };

function interestLabel(v) {
  if (v <= 3) return 'ignore';
  if (v <= 5) return 'tiède';
  if (v <= 7) return 'intéressée';
  if (v <= 9) return 'chaude';
  return 'accro';
}

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    data = raw ? JSON.parse(raw) : DEFAULT_DATA;
    if (!raw) save();
  } catch(e) { data = DEFAULT_DATA; }
}

function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function render() {
  const list = document.getElementById('cardList');
  let filtered = data.filter(g => currentFilter === 'all' || g.status === currentFilter);
  filtered.sort((a,b) => {
    const so = STATUS_ORDER[a.status] - STATUS_ORDER[b.status];
    return so !== 0 ? so : b.phys - a.phys;
  });
  document.getElementById('totalCount').textContent = `${data.length} filles`;

  if (!filtered.length) {
    list.innerHTML = '<div class="empty-state">Aucune fille ici</div>';
    return;
  }

  list.innerHTML = filtered.map(g => {
    const age = 2026 - g.year;
    const isOpen = openCardId === g.id;
    return `
    <div class="card" id="card-${g.id}">
      <div class="card-header" onclick="toggleCard(${g.id})">
        <div class="card-left">
          <div class="card-name-row">
            <span class="card-name">${g.name}</span>
            ${g.flag ? `<span class="flag">${g.flag}</span>` : ''}
          </div>
          <div class="card-tags">
            <span class="tag">${age} ans</span>
            ${g.job ? `<span class="tag">${g.job}</span>` : ''}
            ${g.identity ? `<span class="tag identity">${g.identity}</span>` : ''}
          </div>
        </div>
        <div class="card-right">
          <div class="scores">
            <span class="score-badge score-phys" title="Physique">👁 ${g.phys}</span>
            <span class="score-badge score-int" title="Son intérêt">🎯 ${g.ease}</span>
          </div>
          <div class="status-selector" onclick="event.stopPropagation()">
            ${['cold','warm','hot','dead'].map(s => `
              <div class="status-dot s-${s} ${g.status===s?'active':''}" onclick="setStatus(${g.id},'${s}')"></div>
            `).join('')}
          </div>
        </div>
      </div>
      <div class="card-body ${isOpen?'open':''}" id="body-${g.id}">
        <div class="card-body-inner">

          <div class="score-row">
            <div class="score-box">
              <div class="score-box-label phys">👁 Physique</div>
              <div class="score-box-val phys">${g.phys}<span style="font-size:14px;opacity:0.5">/10</span></div>
              <div class="score-box-sub">Fixe</div>
            </div>
            <div class="score-box">
              <div class="score-box-label interest">🎯 Son intérêt</div>
              <div class="score-box-val interest" id="ease-val-${g.id}">${g.ease}<span style="font-size:14px;opacity:0.5">/10</span></div>
              <div class="score-box-sub" id="ease-lbl-${g.id}">${interestLabel(g.ease)}</div>
            </div>
          </div>

          <div class="field">
            <div class="field-label" style="color:#f59e0b">Mettre à jour son intérêt</div>
            <div class="slider-wrap">
              <input type="range" class="interest-slider" min="1" max="10" step="0.5" value="${g.ease}"
                oninput="previewEase(${g.id}, this.value)"
                onchange="updateEase(${g.id}, this.value)" />
              <div class="slider-labels">
                <span>IGNORE</span><span>TIÈDE</span><span>INTÉRESSÉE</span><span>CHAUDE</span><span>ACCRO</span>
              </div>
            </div>
          </div>

          <div class="field">
            <div class="field-label">📍 Localisation</div>
            <div class="field-value">${g.location || '—'}</div>
          </div>

          ${g.notes ? `
          <div class="field">
            <div class="field-label">📌 Infos clés</div>
            <div class="field-value">${g.notes}</div>
          </div>` : ''}

          <div class="field">
            <div class="field-label">⚡ Prochaine action</div>
            <div class="next-action-row">
              <input class="next-input" id="next-${g.id}" value="${g.nextAction||''}" placeholder="Relancer / Proposer rdv / Attendre..." />
              <button class="save-btn" onclick="saveNext(${g.id}, this)">OK</button>
            </div>
          </div>

          <div class="field">
            <div class="field-label">💬 Notes conv</div>
            <textarea class="field-input" id="conv-${g.id}" placeholder="Dernière interaction, ce qu'elle a dit, contexte...">${g.conv||''}</textarea>
            <button class="save-btn full" onclick="saveConv(${g.id}, this)">Sauvegarder</button>
          </div>

          <button class="delete-btn" onclick="deleteGirl(${g.id})">Supprimer</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function toggleCard(id) {
  openCardId = openCardId === id ? null : id;
  render();
}

function setStatus(id, status) {
  const g = data.find(x => x.id===id);
  if (g) { g.status = status; save(); render(); }
}

function previewEase(id, val) {
  const v = parseFloat(val);
  const el = document.getElementById(`ease-val-${id}`);
  const lb = document.getElementById(`ease-lbl-${id}`);
  if (el) el.innerHTML = `${v}<span style="font-size:14px;opacity:0.5">/10</span>`;
  if (lb) lb.textContent = interestLabel(v);
}

function updateEase(id, val) {
  const g = data.find(x => x.id===id);
  if (g) { g.ease = parseFloat(val); save(); }
}

function saveNext(id, btn) {
  const g = data.find(x => x.id===id);
  if (g) {
    g.nextAction = document.getElementById(`next-${id}`).value;
    save();
    btn.textContent = '✓';
    setTimeout(() => btn.textContent = 'OK', 1000);
  }
}

function saveConv(id, btn) {
  const g = data.find(x => x.id===id);
  if (g) {
    g.conv = document.getElementById(`conv-${id}`).value;
    save();
    btn.textContent = '✓ Sauvegardé';
    setTimeout(() => btn.textContent = 'Sauvegarder', 1200);
  }
}

function deleteGirl(id) {
  if (confirm('Supprimer ?')) {
    data = data.filter(x => x.id!==id);
    if (openCardId===id) openCardId = null;
    save(); render();
  }
}

function openModal() { document.getElementById('modalOverlay').classList.add('open'); }

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  ['m-name','m-year','m-flag','m-location','m-job','m-identity','m-phys','m-ease','m-notes']
    .forEach(id => { document.getElementById(id).value = ''; });
}

function closeModalOutside(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

function addGirl() {
  const name = document.getElementById('m-name').value.trim();
  if (!name) return;
  data.unshift({
    id: Date.now(),
    name,
    flag: document.getElementById('m-flag').value.trim(),
    year: parseInt(document.getElementById('m-year').value) || 2002,
    location: document.getElementById('m-location').value.trim(),
    job: document.getElementById('m-job').value.trim(),
    identity: document.getElementById('m-identity').value.trim(),
    phys: parseFloat(document.getElementById('m-phys').value) || 5,
    ease: parseFloat(document.getElementById('m-ease').value) || 5,
    status: 'cold',
    notes: document.getElementById('m-notes').value.trim(),
    nextAction: '', conv: ''
  });
  save(); closeModal(); render();
}

// Register service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}

load();
render();
</script>
</body>
</html>
